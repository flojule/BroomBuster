<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BroomBuster</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BroomBuster">
  <meta name="theme-color" content="#2563eb">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2563eb; --red: #ef4444;
      --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
      --muted: #64748b; --border: #e2e8f0;
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }

    /* ── Auth ── */
    #auth-screen {
      position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100dvh; padding: 24px;
      background: url('/grim_sweeper_rect.png') center center / cover no-repeat #0f172a;
    }
    #auth-screen::before {
      content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.52); pointer-events: none; z-index: 0;
    }
    #auth-screen > * { position: relative; z-index: 1; }
    #auth-screen h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; color: #f1f5f9; letter-spacing: -.02em; }
    #auth-screen p.tagline { color: #94a3b8; margin-bottom: 24px; text-align: center; font-size: .9rem; }
    .card {
      background: rgba(10,16,30,0.82); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #e2e8f0; }
    label { display: block; font-size: .82rem; font-weight: 500; color: #64748b; margin-bottom: 4px; margin-top: 12px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 9px 11px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px; font-size: .95rem; outline: none; color: #f1f5f9;
      transition: border-color .15s;
    }
    input::placeholder { color: #475569; }
    input:focus { border-color: #059669; }
    button { display: block; width: 100%; padding: 10px; margin-top: 16px; background: var(--blue); color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    button:disabled { opacity: .5; cursor: default; }
    button:not(:disabled):hover { opacity: .9; }
    #btn-login { background: #059669; }
    .btn-ghost { background: transparent; color: #64748b; border: 1px solid rgba(255,255,255,0.13); margin-top: 8px; font-weight: 500; }
    #auth-error { color: #f87171; font-size: .82rem; margin-top: 8px; min-height: 16px; }

    /* ── App ── */
    #app-screen { display: none; flex-direction: column; height: 100dvh; }

    /* ── Topbar ── */
    #topbar {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 10px; background: var(--card);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
    }
    .app-title { font-size: .88rem; font-weight: 700; flex-shrink: 0; }
    /* Vertical separator line between topbar groups */
    .tb-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; align-self: center; margin: 0 3px; }
    /* Unified height for all topbar interactive controls.
       display/width override the global button { block; 100% } rule. */
    .tb-select, .tb-btn {
      display: inline-flex; align-items: center; width: auto;
      height: 26px; box-sizing: border-box; padding: 0 8px; margin: 0;
      font-size: .78rem; font-weight: 600; border-radius: 6px; flex-shrink: 0;
    }
    .tb-select { border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
    #region-select { max-width: 90px; }
    #car-select    { max-width: 120px; }
    #status-text   { flex: 1; font-size: .78rem; font-weight: 600; text-align: center; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; min-width: 60px; }
    #status-text.today    { color: #b91c1c; }
    #status-text.tomorrow { color: #c2410c; }
    #status-text.safe     { color: #1d4ed8; }
    #status-text.idle     { color: var(--muted); }
    #btn-logout  { background: transparent; color: var(--muted); border: 1px solid var(--border); font-weight: 500; }
    #btn-locate        { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
    #btn-locate.ip     { background: #eef1f7; color: #94a3b8; border-color: #d1d9ea; }
    #btn-locate.gps    { background: var(--blue); color: #fff; border-color: var(--blue); }
    #locate-info { font-size: .72rem; color: var(--muted); flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

    /* ── Map container ── */
    #map-container { flex: 1; min-height: 0; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Place banner (tap-to-place mode) ── */
    #place-banner {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: none; align-items: center; gap: 8px;
      background: rgba(37,99,235,.92); color: #fff;
      border-radius: 20px; padding: 7px 14px;
      font-size: .82rem; font-weight: 600;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      white-space: nowrap; pointer-events: auto;
    }
    #place-banner.active { display: flex; }
    #btn-cancel-place {
      width: auto; margin: 0; padding: 3px 10px;
      background: rgba(255,255,255,.2); color: #fff;
      border: 1px solid rgba(255,255,255,.4); border-radius: 12px;
      font-size: .75rem; font-weight: 500;
    }

    /* ── Context menu (right-click) ── */
    #ctx-menu {
      position: fixed; z-index: 200; display: none;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,.14);
      overflow: hidden; min-width: 140px;
    }
    .ctx-item { padding: 7px 14px; cursor: pointer; font-size: .85rem; }
    .ctx-item:hover { background: var(--bg); }

    /* ── Cars panel (persistent top-right info card) ── */
    #cars-panel {
      position: absolute; top: 10px; right: 10px; z-index: 20;
      display: flex; flex-direction: column; gap: 8px;
      max-height: calc(100% - 20px); overflow-y: auto;
      pointer-events: auto;
    }
    .cars-legend {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; overflow: hidden;
      font-size: .7rem; display: flex; gap: 8px; flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      user-select: none;
    }
    .cars-legend span { white-space: nowrap; font-weight: 500; }
    .car-entry {
      background: var(--urg-bg, var(--card)); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      width: 200px; flex-shrink: 0; display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; transition: border .12s, background .12s;
    }
    .car-entry.selected {
      border: 2px solid var(--car-color);
      padding: 9px 11px; /* compensate for extra border px */
    }
    .ce-header { display: flex; align-items: center; gap: 6px; }
    .ce-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--car-color, #3b82f6); flex-shrink: 0;
    }
    .ce-name {
      flex: 1; font-weight: 600; font-size: .84rem; outline: none;
      cursor: default; border-bottom: 1px solid transparent; min-width: 0;
      user-select: none;
    }
    .ce-name[contenteditable="true"] { cursor: text; border-bottom-color: var(--blue); user-select: text; }
    .ce-remove {
      width: auto; margin: 0; padding: 1px 5px; flex-shrink: 0;
      background: transparent; border: none; color: var(--muted);
      font-size: .8rem; cursor: pointer; opacity: .55; line-height: 1;
    }
    .ce-remove:hover { opacity: 1; color: var(--red); }
    .ce-addr {
      font-size: .75rem; color: var(--muted); outline: none;
      cursor: default; border-bottom: 1px solid transparent; min-height: 1em;
      user-select: none;
    }
    .ce-addr[contenteditable="true"] { cursor: text; color: var(--text); border-bottom-color: var(--blue); user-select: text; }
    .ce-addr:empty::before { content: 'double-click to set address'; opacity: .45; font-size: .7rem; }
    .ce-sched { font-size: .73rem; line-height: 1.45; }
    .ce-sched-urgency { font-weight: 600; }
    .ce-sched-header  { font-size: .68rem; font-weight: 600; color: var(--muted); margin-top: 4px; white-space: nowrap; }
    .ce-sched-item    { font-size: .73rem; color: var(--muted); padding-left: 4px; line-height: 1.4; }
    .ce-actions { display: flex; gap: 5px; margin-top: 3px; }
    .ce-btn {
      flex: 1; width: auto; margin: 0; padding: 4px 6px;
      font-size: .71rem; font-weight: 500; border-radius: 6px; white-space: nowrap;
      background: transparent; border: 1px solid var(--border);
      color: var(--text); cursor: pointer; text-align: center;
    }
    .ce-btn:hover { background: var(--bg); }

    /* ── GPS pin popup (add car here) ── */
    #gps-pin-popup {
      position: absolute; z-index: 30; display: none;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 5px 8px; box-shadow: 0 2px 10px rgba(0,0,0,.14);
      transform: translate(-50%, calc(-100% - 24px));
      white-space: nowrap; overflow: hidden;
    }
    #btn-gps-add { width: auto; margin: 0; padding: 4px 10px; font-size: .76rem; font-weight: 600; border-radius: 6px; }

    /* ── Inline name panel — single line ── */
    #name-panel {
      position: fixed; z-index: 150; display: none;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 9px; overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,.16);
    }
    .np-row { display: flex; gap: 6px; align-items: center; }
    #name-panel-input { flex: 1; padding: 5px 7px; border: 1px solid var(--border); border-radius: 6px; font-size: .85rem; outline: none; min-width: 110px; background: var(--bg); color: var(--text); }
    #name-panel-input:focus { border-color: var(--blue); }
    #btn-np-save { margin: 0; padding: 5px 10px; width: auto; border-radius: 6px; font-size: .82rem; }

    /* ── Custom hover tooltip ── */
    #custom-hover {
      position: fixed; z-index: 90; display: none; pointer-events: none;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 7px 10px; max-width: 240px; line-height: 1.45;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .76rem; color: var(--text);
      box-shadow: 0 3px 10px rgba(0,0,0,.12);
    }

    /* ── Hide Mapbox/Plotly attribution controls (lower-right) ── */
    .mapboxgl-ctrl-bottom-right, .mapboxgl-ctrl-bottom-left { display: none !important; }
    .js-plotly-plot .plotly a.modebar-btn { display: none !important; }
    /* Hide Plotly's native hover label/arrow. pointer-events:none lets Mapbox GL
       canvas receive mousemove/click directly, which is how scattermapbox fires
       plotly_hover and plotly_click. Car selection is guarded by _plotlyClickHandled. */
    .hoverlayer { opacity: 0 !important; pointer-events: none !important; }

    /* ── Spinner ── */
    .spinner { width: 11px; height: 11px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════════ AUTH SCREEN ══════════════════ -->
<div id="auth-screen">
  <h1>🧹 BroomBuster</h1>
  <p class="tagline">Know before the grim sweeper comes.</p>
  <div class="card">
    <h2>Sign in</h2>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <div id="auth-error"></div>
    <button id="btn-login">Sign in</button>
    <button class="btn-ghost" id="btn-signup">Create account</button>
  </div>
</div>

<!-- ══════════════════ APP SCREEN ══════════════════ -->
<div id="app-screen">
  <div id="topbar">
    <span class="app-title">🧹 BroomBuster</span>
    <span class="tb-sep"></span>
    <select id="region-select" class="tb-select"></select>
    <select id="car-select" class="tb-select"></select>
    <span id="status-text" class="idle">—</span>
    <span id="locate-info"></span>
    <button id="btn-locate" class="tb-btn" title="Use GPS location">📍</button>
    <span class="tb-sep"></span>
    <select id="sel-map-style" class="tb-select">
      <option value="open-street-map">🗺 OSM</option>
      <option value="carto-positron" selected>☀️ Light</option>
      <option value="carto-darkmatter">🌙 Dark</option>
      <option value="stamen-toner">⬛ Toner</option>
    </select>
    <span class="tb-sep"></span>
    <button id="btn-logout" class="tb-btn">Sign out</button>
  </div>
  <div id="map-container">
    <div id="map"></div>

    <!-- Floating pill shown during tap-to-place mode -->
    <div id="place-banner">
      📍 Tap the map to place your car
      <button id="btn-cancel-place">Cancel</button>
    </div>

    <!-- Right-click context menu -->
    <div id="ctx-menu">
      <div class="ctx-item" id="ctx-add-car">+ Add car here</div>
    </div>

    <!-- Persistent cars info panel (top-right) -->
    <div id="cars-panel">
      <div id="map-legend" class="cars-legend">
        <span style="color:#ef4444">■ Today</span>
        <span style="color:#f97316">■ Tomorrow</span>
        <span style="color:#2563eb">■ Clear</span>
      </div>
    </div>

    <!-- GPS "you are here" pin popup -->
    <div id="gps-pin-popup">
      <button id="btn-gps-add">📍 Add car here</button>
    </div>
  </div>
</div>

<!-- ══════════════════ INLINE NAME PANEL ══════════════════ -->
<div id="name-panel">
  <div class="np-row">
    <input type="text" id="name-panel-input" placeholder="Car name…" maxlength="32">
    <button id="btn-np-save">Save</button>
  </div>
</div>

<!-- ══════════════════ CUSTOM HOVER ══════════════════ -->
<div id="custom-hover"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SUPABASE_URL  = window.SUPABASE_URL  || 'https://bebepoowtumqmzwlydeu.supabase.co';
const SUPABASE_ANON = window.SUPABASE_ANON || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlYmVwb293dHVtcW16d2x5ZGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDg2ODEsImV4cCI6MjA4OTE4NDY4MX0.BHZ2EiFN1-GiM7QEsxnqMB8oVI1Jzl1LH3D-y230nk4';

const DEFAULT_CENTER = { lat: 37.820, lon: -122.295, zoom: 11 };
const CAR_COLORS = ['#3b82f6','#10b981','#a855f7','#06b6d4','#ec4899','#84cc16','#6366f1','#22d3ee'];
function carColor(idx) { return CAR_COLORS[idx % CAR_COLORS.length]; }

// ── Car selection helpers ──────────────────────────────────────────────────────
function clearCarSelection() {
  _selectedCarId = null;
  unhighlightCarOnMap();
  for (const e of carsPanel.querySelectorAll('.car-entry')) e.classList.remove('selected');
}

function isCarInView(car) {
  try { return getMapboxMap()?.getBounds()?.contains([car.lon, car.lat]) ?? false; }
  catch (_) { return false; }
}

function setSelectedCar(carId) {
  _selectedCarId = carId;
  for (const e of carsPanel.querySelectorAll('.car-entry')) {
    e.classList.toggle('selected', e.dataset.id === carId);
  }
  const car = cars.find(c => c.id === carId);
  if (car && !isCarInView(car)) {
    try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat: car.lat, lon: car.lon }, 'mapbox.zoom': 16 }); } catch (_) {}
  }
  highlightCarOnMap();
}

// Highlight selected car ring with a larger marker (one-shot, no RAF loop).
function highlightCarOnMap() {
  if (!_selectedCarId || !_baseFigure) return;
  const carIdx = cars.findIndex(c => c.id === _selectedCarId);
  if (carIdx === -1) return;
  try { Plotly.restyle(mapDiv, { 'marker.size': [22] }, [_baseFigure.data.length + carIdx]); } catch (_) {}
}

function unhighlightCarOnMap() {
  if (!_baseFigure || !cars.length) return;
  const n = _baseFigure.data.length;
  try { Plotly.restyle(mapDiv, { 'marker.size': 14 }, cars.map((_, i) => n + i)); } catch (_) {}
}

function updateGpsPinPopup() {
  const popup = document.getElementById('gps-pin-popup');
  if (!_gpsLocPin) { popup.style.display = 'none'; return; }
  const mbMap = getMapboxMap();
  if (!mbMap) { popup.style.display = 'none'; return; }
  const px = mbMap.project([_gpsLocPin.lon, _gpsLocPin.lat]);
  popup.style.left = Math.round(px.x) + 'px';
  popup.style.top  = Math.round(px.y) + 'px';
  popup.style.display = 'block';
}

document.getElementById('btn-gps-add').addEventListener('click', () => {
  if (!_gpsLocPin) return;
  pendingLat = _gpsLocPin.lat; pendingLon = _gpsLocPin.lon;
  // Drop a temp pin at GPS loc and open the name panel near the popup
  addTempPin(pendingLat, pendingLon);
  const popup = document.getElementById('gps-pin-popup');
  const rect  = popup.getBoundingClientRect();
  showNamePanel(rect.left + rect.width / 2, rect.top);
});

function getMapboxStyle() {
  return document.getElementById('sel-map-style')?.value || 'carto-positron';
}

// ── Supabase ──────────────────────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── State ─────────────────────────────────────────────────────────────────────
let session        = null;
let cars           = [];
let activeCarId    = null;
let regions        = {};
let placingCar     = false;
let placingEditId  = null;
let pendingLat     = null, pendingLon = null;
let carSchedules   = {};    // carId → /check response
let _baseFigure    = null;  // last /check figure; used for react updates
let _tempPin       = null;  // {lat,lon} while naming a new car
let _ctxScreenX    = 0, _ctxScreenY = 0;
let _mbPlaceHandler = null;
let _locationKnown = false;
let _selectedCarId = null;
let _locSource = null, _locLat = null, _locLon = null, _locRegion = null, _locCity = null;
let _mbBgClickHandler = null;
let _mbMoveStartHandler = null, _mbMoveEndHandler = null, _mbMoveHandler = null;
let _gpsLocPin = null;  // temporary "you are here" pin from locate button
let _gpsLocPinTimer = null;
let _plotlyClickHandled = false;  // guards against mbMap bg-click clearing a just-set selection

// ── DOM ───────────────────────────────────────────────────────────────────────
const authScreen     = document.getElementById('auth-screen');
const appScreen      = document.getElementById('app-screen');
const emailEl        = document.getElementById('email');
const passwordEl     = document.getElementById('password');
const authError      = document.getElementById('auth-error');
const btnLogin       = document.getElementById('btn-login');
const btnSignup      = document.getElementById('btn-signup');
const btnLogout      = document.getElementById('btn-logout');
const btnLocate      = document.getElementById('btn-locate');
const regionSelect   = document.getElementById('region-select');
const carSelect      = document.getElementById('car-select');
const statusText     = document.getElementById('status-text');
const mapDiv         = document.getElementById('map');
const placeBanner    = document.getElementById('place-banner');
const btnCancelPlace = document.getElementById('btn-cancel-place');
const ctxMenu        = document.getElementById('ctx-menu');
const ctxAddCar      = document.getElementById('ctx-add-car');
const carsPanel      = document.getElementById('cars-panel');
const namePanel      = document.getElementById('name-panel');
const namePanelInput = document.getElementById('name-panel-input');
const btnNpSave      = document.getElementById('btn-np-save');

// ── Auth ──────────────────────────────────────────────────────────────────────
sb.auth.getSession().then(({ data }) => {
  session = data.session;
  session ? initApp() : showAuth();
});
sb.auth.onAuthStateChange((_e, s) => {
  const wasNull = !session;
  session = s;
  if (s && wasNull) initApp();
  if (!s) showAuth();
});

function showAuth() {
  authScreen.style.display = 'flex';
  appScreen.style.display  = 'none';
}

async function initApp() {
  authScreen.style.display = 'none';
  appScreen.style.display  = 'flex';
  updateCarSelect();
  renderDefaultMap();
  // Load cities, prefs, and IP location all in parallel for faster startup.
  const [,,ipLoc] = await Promise.all([loadCities(), loadPrefs(), getIPLocation()]);
  if (cars.length > 0) {
    activeCarId = cars[0].id;
    updateCarSelect();
    setNearestRegion(cars[0].lat, cars[0].lon);
    // Re-center immediately, then load zone overlays in the background.
    try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat: cars[0].lat, lon: cars[0].lon }, 'mapbox.zoom': 16 }); } catch(_) {}
    await checkCarWithRender(cars[0]);
    for (const car of cars.slice(1)) checkCarSilently(car);
  } else if (ipLoc) {
    setNearestRegion(ipLoc.lat, ipLoc.lon);
    setLocationKnown('ip', null, null, ipLoc.city);
    try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat: ipLoc.lat, lon: ipLoc.lon }, 'mapbox.zoom': 13 }); } catch(_) {}
    setStatus('idle', 'Loading map…');
    loadAreaMap(ipLoc.lat, ipLoc.lon, 13); // async — overlays load in background
  } else {
    setStatus('idle', 'Select a region or add a car to load the map.');
  }
}

// ── Auth forms ────────────────────────────────────────────────────────────────
async function login() {
  authError.textContent = '';
  btnLogin.disabled = true;
  btnLogin.innerHTML = '<span class="spinner"></span>Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email: emailEl.value.trim(), password: passwordEl.value });
  btnLogin.disabled = false;
  btnLogin.textContent = 'Sign in';
  if (error) authError.textContent = error.message;
}

async function signup() {
  authError.textContent = '';
  btnSignup.disabled = true;
  btnSignup.innerHTML = '<span class="spinner"></span>Creating account…';
  const { error } = await sb.auth.signUp({ email: emailEl.value.trim(), password: passwordEl.value });
  btnSignup.disabled = false;
  btnSignup.textContent = 'Create account';
  if (error) {
    authError.textContent = error.message;
  } else {
    authError.style.color = '#16a34a';
    authError.textContent = 'Check your email to confirm, then sign in.';
  }
}

btnLogin.addEventListener('click', login);
btnSignup.addEventListener('click', signup);
[emailEl, passwordEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') login(); }));
btnLogout.addEventListener('click', () => sb.auth.signOut());

// ── Map helpers ───────────────────────────────────────────────────────────────
function getMapboxMap() {
  try { return mapDiv._fullLayout.mapbox._subplot.map; }
  catch (_) { return null; }
}

function defaultCarName() {
  const used = new Set(cars.map(c => c.name));
  if (!used.has('Car')) return 'Car';
  let i = 2;
  while (used.has(`Car ${i}`)) i++;
  return `Car ${i}`;
}

function latLonToScreen(lat, lon) {
  const mbMap = getMapboxMap();
  if (!mbMap) return null;
  const rect = mapDiv.getBoundingClientRect();
  const px = mbMap.project([lon, lat]);
  return { x: rect.left + px.x, y: rect.top + px.y };
}

function nearestRegionNameByCoords(lat, lon) {
  let best = null, bestDist = Infinity;
  for (const [, r] of Object.entries(regions)) {
    const d = (r.center.lat - lat) ** 2 + (r.center.lon - lon) ** 2;
    if (d < bestDist) { bestDist = d; best = r.name; }
  }
  return best || '';
}

// source: 'gps' | 'ip' | false
function setLocationKnown(source, lat = null, lon = null, city = null) {
  _locationKnown = !!source;
  _locSource = source || null;
  _locLat = lat; _locLon = lon;
  _locCity = city || null;
  btnLocate.classList.remove('ip', 'gps');
  if (source) btnLocate.classList.add(source);
  updateLocateInfo();
}

function updateLocateInfo() {
  const el = document.getElementById('locate-info');
  if (!_locSource) { el.textContent = ''; return; }
  if (_locSource === 'ip') {
    el.textContent = _locCity ? `IP: ${_locCity}` : 'IP';
  } else {
    const coords = (_locLat !== null && _locLon !== null)
      ? `${_locLat.toFixed(4)}, ${_locLon.toFixed(4)}` : '';
    const area = _locCity || nearestRegionNameByCoords(_locLat, _locLon);
    el.textContent = coords
      ? `GPS: ${coords}${area ? ' · ' + area : ''}`
      : `GPS${area ? ': ' + area : ''}`;
  }
}

function screenToLatLon(clientX, clientY) {
  const mbMap = getMapboxMap();
  if (!mbMap) return null;
  const rect = mapDiv.getBoundingClientRect();
  const ll = mbMap.unproject([clientX - rect.left, clientY - rect.top]);
  return { lat: ll.lat, lon: ll.lng };
}

// ── Map contextmenu (right-click to add car) ─────────────────────────────────
mapDiv.addEventListener('contextmenu', e => {
  e.preventDefault();
  const pos = screenToLatLon(e.clientX, e.clientY);
  if (!pos) return;
  pendingLat = pos.lat;
  pendingLon = pos.lon;
  showCtxMenu(e.clientX, e.clientY);
});

document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
  // Close name panel when clicking outside it (but not from the elements that open it)
  if (namePanel.style.display !== 'none'
      && !e.target.closest('#name-panel')
      && !e.target.closest('#ctx-menu')
      && !e.target.closest('#gps-pin-popup')) {
    hideNamePanel();
  }
});

// ── Default map ───────────────────────────────────────────────────────────────
function renderDefaultMap() {
  Plotly.newPlot(mapDiv, [], {
    mapbox: { style: getMapboxStyle(), center: { lat: DEFAULT_CENTER.lat, lon: DEFAULT_CENTER.lon }, zoom: DEFAULT_CENTER.zoom },
    margin: { r: 0, t: 0, l: 0, b: 0 },
  }, { scrollZoom: true, displayModeBar: false, responsive: true }).then(attachPlotlyListeners);
}

let _renderedRegion = null;

function renderMap(figure) {
  if (!figure || !figure.data) return;
  _baseFigure = figure;
  const region = regionSelect.value;
  // newPlot on region change (clears stale polygon fills); react otherwise (preserves tile cache).
  const isNewRegion = region !== _renderedRegion;
  const fn = isNewRegion ? Plotly.newPlot : Plotly.react;
  _renderedRegion = region;
  // Preserve user-selected map style and current pan/zoom on same-region reload.
  const backendMb = figure.layout?.mapbox || {};
  const liveMb    = !isNewRegion ? getMapboxMap() : null;
  const liveCenter = liveMb?.getCenter();
  const center = liveCenter
    ? { lat: liveCenter.lat, lon: liveCenter.lng }
    : (backendMb.center || { lat: DEFAULT_CENTER.lat, lon: DEFAULT_CENTER.lon });
  const zoom = liveMb ? liveMb.getZoom() : (backendMb.zoom ?? DEFAULT_CENTER.zoom);
  const layout = {
    ...(figure.layout || {}),
    mapbox: { ...backendMb, style: getMapboxStyle(), center, zoom },
    margin: { r: 0, t: 0, l: 0, b: 0 },
  };
  fn(mapDiv, [...figure.data, ...buildCarTraces()], layout, {
    scrollZoom: true, displayModeBar: false, responsive: true,
  }).then(() => { attachPlotlyListeners(); highlightCarOnMap(); });
}

// Abbreviate street address for compact display.
function abbreviate(s) {
  if (!s) return s;
  return s
    .replace(/\bAvenue\b/gi, 'Ave').replace(/\bBoulevard\b/gi, 'Blvd')
    .replace(/\bStreet\b/gi, 'St').replace(/\bDrive\b/gi, 'Dr')
    .replace(/\bCourt\b/gi, 'Ct').replace(/\bPlace\b/gi, 'Pl')
    .replace(/\bLane\b/gi, 'Ln').replace(/\bRoad\b/gi, 'Rd')
    .replace(/\bNorth\b/gi, 'N').replace(/\bSouth\b/gi, 'S')
    .replace(/\bEast\b/gi, 'E').replace(/\bWest\b/gi, 'W');
}

// Build car marker traces: rings[i] at index n+i, dots[i] at index n+cars.length+i.
// (n = _baseFigure.data.length — the backend zone traces)
function buildCarTraces() {
  const rings = cars.map((car, i) => ({
    type: 'scattermapbox', lat: [car.lat], lon: [car.lon], mode: 'markers',
    marker: { size: 14, color: '#ffffff', opacity: 0.9 },
    hoverinfo: 'none', showlegend: false,
  }));
  const dots = cars.map((car, i) => {
    const addr = abbreviate(carSchedules[car.id]?.address || car.address || `${car.lat.toFixed(4)}, ${car.lon.toFixed(4)}`);
    return {
      type: 'scattermapbox', lat: [car.lat], lon: [car.lon], mode: 'markers',
      marker: { size: 10, color: carColor(i), opacity: 1.0 },
      hoverinfo: 'none', showlegend: false,
    };
  });
  const pinTraces = _tempPin ? [
    { type: 'scattermapbox', lat: [_tempPin.lat], lon: [_tempPin.lon], mode: 'markers',
      marker: { size: 13, color: '#111111', opacity: 0.9 }, hoverinfo: 'none', showlegend: false },
    { type: 'scattermapbox', lat: [_tempPin.lat], lon: [_tempPin.lon], mode: 'markers',
      marker: { size: 10, color: '#64748b', opacity: 1.0 }, hoverinfo: 'none', showlegend: false },
  ] : [];
  // "You are here" GPS locate pin — large translucent ring + solid blue dot
  const gpsTraces = _gpsLocPin ? [
    { type: 'scattermapbox', lat: [_gpsLocPin.lat], lon: [_gpsLocPin.lon], mode: 'markers',
      marker: { size: 24, color: 'rgba(37,99,235,0.20)', opacity: 1.0 }, hoverinfo: 'none', showlegend: false },
    { type: 'scattermapbox', lat: [_gpsLocPin.lat], lon: [_gpsLocPin.lon], mode: 'markers',
      marker: { size: 11, color: '#2563eb', opacity: 1.0 }, hoverinfo: 'none', showlegend: false },
  ] : [];
  return [...rings, ...dots, ...pinTraces, ...gpsTraces];
}

// Re-render car markers + panel, preserving current pan/zoom.
function overlayCarMarkers() {
  if (!mapDiv.data) return;
  const base = _baseFigure ? _baseFigure.data : [];
  const layout = mapDiv.layout || (_baseFigure ? _baseFigure.layout : {
    mapbox: { style: 'open-street-map', center: DEFAULT_CENTER, zoom: DEFAULT_CENTER.zoom },
    margin: { r: 0, t: 0, l: 0, b: 0 },
  });
  Plotly.react(mapDiv, [...base, ...buildCarTraces()], layout, {
    scrollZoom: true, displayModeBar: false, responsive: true,
  }).then(() => { attachPlotlyListeners(); highlightCarOnMap(); });
  renderCarsPanel();
}

// Reverse-geocode a coordinate to a short address string (Nominatim).
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
    const d = await r.json();
    if (!d.address) return null;
    const a = d.address;
    const num    = a.house_number || '';
    const street = a.road || a.pedestrian || '';
    const city   = a.city || a.town || a.village || '';
    return [num, street].filter(Boolean).join(' ') + (city ? `, ${city}` : '');
  } catch (_) { return null; }
}

function addTempPin(lat, lon) { _tempPin = { lat, lon }; overlayCarMarkers(); }
function removeTempPin()      { _tempPin = null;         overlayCarMarkers(); }

// ── Plotly event listeners (re-attached after every newPlot) ─────────────────
function handlePlotlyClick(data) {
  if (placingCar) return;
  _plotlyClickHandled = true;
  setTimeout(() => { _plotlyClickHandled = false; }, 200);
  if (!data.points || !data.points.length || !_baseFigure) { clearCarSelection(); return; }
  const pt    = data.points[0];
  const n     = _baseFigure.data.length;
  const curve = pt.curveNumber;
  // Car ring traces: [n .. n+cars.length-1], dots: [n+cars.length .. n+2*cars.length-1]
  if (curve < n || curve >= n + 2 * cars.length) { clearCarSelection(); return; }
  const carIdx = curve < n + cars.length ? curve - n : curve - n - cars.length;
  const clicked = cars[carIdx];
  if (!clicked) { clearCarSelection(); return; }
  setSelectedCar(clicked.id);
  const entry = carsPanel.querySelector(`.car-entry[data-id="${clicked.id}"]`);
  if (entry) entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

const customHoverEl = document.getElementById('custom-hover');

function attachPlotlyListeners() {
  try { mapDiv.removeAllListeners('plotly_click');
        mapDiv.removeAllListeners('plotly_hover');
        mapDiv.removeAllListeners('plotly_unhover'); } catch (_) {}
  mapDiv.on('plotly_click', handlePlotlyClick);
  // Custom HTML hover (replaces Plotly's hidden hover layer)
  mapDiv.on('plotly_hover', data => {
    const pt = data.points?.[0];
    const text = pt?.text;
    if (!text) { customHoverEl.style.display = 'none'; return; }
    // Mapbox GL events wrap the DOM event in .originalEvent
    const ev = data.event?.originalEvent || data.event;
    if (!ev?.clientX) { customHoverEl.style.display = 'none'; return; }
    const x = Math.min(ev.clientX + 14, window.innerWidth  - 250);
    const y = Math.max(ev.clientY - 10, 10);
    customHoverEl.innerHTML = text;
    customHoverEl.style.left = x + 'px';
    customHoverEl.style.top  = y + 'px';
    customHoverEl.style.display = 'block';
  });
  mapDiv.on('plotly_unhover', () => { customHoverEl.style.display = 'none'; });

  const mbMap = getMapboxMap();
  if (mbMap) {
    // Background click → deselect car
    if (_mbBgClickHandler) try { mbMap.off('click', _mbBgClickHandler); } catch (_) {}
    _mbBgClickHandler = () => { if (!placingCar && !_plotlyClickHandled) clearCarSelection(); };
    mbMap.on('click', _mbBgClickHandler);

    // Hide hover tooltip while panning
    if (_mbMoveStartHandler) try { mbMap.off('movestart', _mbMoveStartHandler); } catch (_) {}
    _mbMoveStartHandler = () => { customHoverEl.style.display = 'none'; };
    mbMap.on('movestart', _mbMoveStartHandler);

    // Update GPS popup position while dragging
    if (_mbMoveHandler) try { mbMap.off('move', _mbMoveHandler); } catch (_) {}
    _mbMoveHandler = updateGpsPinPopup;
    mbMap.on('move', _mbMoveHandler);

    // Update GPS popup after move ends
    if (_mbMoveEndHandler) try { mbMap.off('moveend', _mbMoveEndHandler); } catch (_) {}
    _mbMoveEndHandler = () => { updateGpsPinPopup(); };
    mbMap.on('moveend', _mbMoveEndHandler);
  }
}

// ── Cities / regions ──────────────────────────────────────────────────────────
async function loadCities() {
  try {
    const res = await fetch('/cities');
    if (!res.ok) return;
    const data = await res.json();
    regions = {};
    regionSelect.innerHTML = '';
    for (const [key, val] of Object.entries(data.regions)) {
      regions[key] = { name: val.name, center: val.center };
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = val.name;
      regionSelect.appendChild(opt);
    }
  } catch (_) {}
}

regionSelect.addEventListener('change', () => {
  const rk = regionSelect.value;
  const rName = regions[rk]?.name || rk;
  setStatus('idle', `Loading ${rName}…`);
  // Immediately pan to region center while data loads
  const rc = regions[rk]?.center;
  if (rc) { try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat: rc.lat, lon: rc.lon }, 'mapbox.zoom': 11 }); } catch(_) {} }

  // Find first car whose nearest region matches, or fall back to region center
  const carInRegion = cars.find(c => {
    let best = null, bd = Infinity;
    for (const [k, r] of Object.entries(regions)) {
      const d = (r.center.lat - c.lat) ** 2 + (r.center.lon - c.lon) ** 2;
      if (d < bd) { bd = d; best = k; }
    }
    return best === rk;
  });
  if (carInRegion) {
    activeCarId = carInRegion.id;
    updateCarSelect();
    checkCarWithRender(carInRegion);
  } else {
    const c = regions[rk]?.center;
    if (c) loadAreaMap(c.lat, c.lon);
  }
});

// ── Nearest region ────────────────────────────────────────────────────────────
function setNearestRegion(lat, lon) {
  let best = null, bestDist = Infinity;
  for (const [key, r] of Object.entries(regions)) {
    const d = (r.center.lat - lat) ** 2 + (r.center.lon - lon) ** 2;
    if (d < bestDist) { bestDist = d; best = key; }
  }
  if (best && regionSelect.value !== best) regionSelect.value = best;
}

// ── Cars ──────────────────────────────────────────────────────────────────────
async function loadPrefs() {
  if (!session) return;
  try {
    const res = await apiFetch('/prefs');
    if (res.ok) {
      const prefs = await res.json();
      cars = prefs.cars || [];
    }
  } catch (_) {}
  updateCarSelect();
}

async function savePrefs() {
  if (!session) return;
  try {
    await apiFetch('/prefs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cars }),
    });
  } catch (_) {}
}

function updateCarSelect() {
  const prev = carSelect.value;
  carSelect.innerHTML = '';
  for (const car of cars) {
    const opt = document.createElement('option');
    opt.value = car.id;
    opt.textContent = car.name;
    carSelect.appendChild(opt);
  }
  const addOpt = document.createElement('option');
  addOpt.value = '__add__';
  addOpt.textContent = '＋ Add car…';
  carSelect.appendChild(addOpt);
  carSelect.value = activeCarId || (prev !== '__add__' ? prev : '') || (cars[0]?.id ?? '');
}

carSelect.addEventListener('change', () => {
  const val = carSelect.value;
  if (val === '__add__') {
    carSelect.value = activeCarId || cars[0]?.id || '';
    startPlacing(); // drag-map to select location
    return;
  }
  activeCarId = val || null;
  if (activeCarId) {
    const car = cars.find(c => c.id === activeCarId);
    if (car) {
      setNearestRegion(car.lat, car.lon);
      // Immediately re-center on the car (no network wait)
      try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat: car.lat, lon: car.lon }, 'mapbox.zoom': 16 }); } catch(_) {}
      if (carSchedules[car.id]?.figure) {
        // Cache hit: render zone map instantly, refresh silently in background
        renderMap(carSchedules[car.id].figure);
        updateStatusFromSchedules();
        renderCarsPanel();
        checkCarSilently(car);
      } else {
        checkCarWithRender(car);
      }
    }
  }
});

// IP-based approximate location — no permission prompt, works server-side too.
async function getIPLocation() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    if (d.latitude && d.longitude) return { lat: d.latitude, lon: d.longitude, city: d.city || '' };
  } catch (_) {}
  return null;
}

// Load street-zone map for any lat/lon (no car required).
async function loadAreaMap(lat, lon, zoom = 11) {
  try {
    const res = await apiFetch('/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat, lon, region: regionSelect.value || undefined }),
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.figure?.layout?.mapbox) data.figure.layout.mapbox.zoom = zoom;
    renderMap(data.figure);
    if (_locSource !== 'gps') setLocationKnown('ip');
    setStatus('idle', 'Add a car to check street sweeping.');
  } catch (_) {}
}

// GPS — only used for car location updates (not for initial load)
function getGPS(onSuccess, onError) {
  if (!navigator.geolocation) { onError?.('Geolocation not supported.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => onSuccess(pos.coords.latitude, pos.coords.longitude),
    err => onError?.(err.message),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── Per-car schedule checks ───────────────────────────────────────────────────
// Fetch /check for a car, render the street zone map, cache result.
async function checkCarWithRender(car) {
  setStatus('idle', 'Checking…');
  const warmupTimer = setTimeout(() => setStatus('idle', '⏳ Server warming up, please wait…'), 5000);
  try {
    const res = await apiFetch('/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: car.lat, lon: car.lon, region: regionSelect.value || undefined }),
    });
    clearTimeout(warmupTimer);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      setStatus('idle', `Error: ${err.detail}`);
      return;
    }
    const data = await res.json();
    carSchedules[car.id] = data;
    renderMap(data.figure);
    if (!_locationKnown) setLocationKnown('ip');
    updateStatusFromSchedules();
    renderCarsPanel();
  } catch (e) { clearTimeout(warmupTimer); setStatus('idle', `Network error: ${e.message}`); }
}

// Fetch /check for a car silently (no map re-render), update status + markers.
async function checkCarSilently(car) {
  try {
    const res = await apiFetch('/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lat: car.lat, lon: car.lon, region: regionSelect.value || undefined }),
    });
    if (!res.ok) return;
    carSchedules[car.id] = await res.json();
    updateStatusFromSchedules();
    overlayCarMarkers(); // also calls renderCarsPanel
  } catch (_) {}
}

function updateStatusFromSchedules() {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  let worst = 'safe', worstCar = null;
  for (const [carId, s] of Object.entries(carSchedules)) {
    if (s.urgency === 'today') { worst = 'today'; worstCar = cars.find(c => c.id === carId); break; }
    if (s.urgency === 'tomorrow' && worst !== 'today') { worst = 'tomorrow'; worstCar = cars.find(c => c.id === carId); }
  }
  const dateSpan = `<span style="color:var(--muted);font-weight:400">${today}</span>&emsp;`;
  const name = esc(worstCar ? worstCar.name : 'your car');
  statusText.className = worst;
  if      (worst === 'today')    statusText.innerHTML = `${dateSpan}🚨 Move ${name} today!`;
  else if (worst === 'tomorrow') statusText.innerHTML = `${dateSpan}⚠️ Move ${name} tomorrow.`;
  else                           statusText.innerHTML = `${dateSpan}✅ No sweeping today or tomorrow.`;
}

// ── Car placement (tap-to-place) ──────────────────────────────────────────────
function startPlacing(editCarId = null) {
  placingCar    = true;
  placingEditId = editCarId;
  placeBanner.classList.add('active');

  // Attach a one-shot click listener on the Mapbox map instance.
  const mbMap = getMapboxMap();
  if (mbMap) {
    _mbPlaceHandler = (e) => commitPlacement(e.lngLat.lat, e.lngLat.lng);
    mbMap.on('click', _mbPlaceHandler);
  }
}

function stopPlacing() {
  placingCar    = false;
  placingEditId = null;
  placeBanner.classList.remove('active');
  carSelect.value = activeCarId || '';

  // Remove the mapbox click listener if still attached.
  const mbMap = getMapboxMap();
  if (mbMap && _mbPlaceHandler) {
    mbMap.off('click', _mbPlaceHandler);
    _mbPlaceHandler = null;
  }
}

// Called when the user taps a map location during placement mode.
async function commitPlacement(lat, lon) {
  const editId = placingEditId; // save before stopPlacing() clears it
  stopPlacing();

  if (editId) {
    // Updating an existing car's position.
    const car = cars.find(c => c.id === editId);
    if (car) {
      car.lat = lat; car.lon = lon;
      car.address = await reverseGeocode(lat, lon);
      await savePrefs();
      overlayCarMarkers();
      checkCarSilently(car); // refresh schedule for new location
    }
  } else {
    // Adding a new car — drop temp pin, show name panel next to it.
    pendingLat = lat; pendingLon = lon;
    addTempPin(lat, lon);
    const sc   = latLonToScreen(lat, lon);
    const rect = mapDiv.getBoundingClientRect();
    showNamePanel(
      sc ? sc.x : rect.left + rect.width  / 2,
      sc ? sc.y : rect.top  + rect.height / 2
    );
  }
}

btnCancelPlace.addEventListener('click', stopPlacing);

// ── Context menu ──────────────────────────────────────────────────────────────
function showCtxMenu(x, y) {
  _ctxScreenX = x; _ctxScreenY = y;
  const mw = 170, mh = 44;
  ctxMenu.style.left = Math.min(x, window.innerWidth  - mw) + 'px';
  ctxMenu.style.top  = Math.min(y, window.innerHeight - mh) + 'px';
  ctxMenu.style.display = 'block';
}

function hideCtxMenu() { ctxMenu.style.display = 'none'; }

ctxAddCar.addEventListener('click', () => {
  hideCtxMenu();
  addTempPin(pendingLat, pendingLon);
  showNamePanel(_ctxScreenX, _ctxScreenY);
});

// ── Inline name panel (no overlay) ───────────────────────────────────────────
function showNamePanel(screenX, screenY) {
  namePanelInput.value = defaultCarName();
  const pw = 210, ph = 44;
  // Center the panel horizontally on the trigger point, clamp to viewport
  const left = Math.min(Math.max(screenX - pw / 2, 8), window.innerWidth  - pw - 8);
  const top  = Math.min(screenY, window.innerHeight - ph - 8);
  namePanel.style.left    = left + 'px';
  namePanel.style.top     = top  + 'px';
  namePanel.style.display = 'block';
  setTimeout(() => { namePanelInput.focus(); namePanelInput.select(); }, 30);
}

function hideNamePanel() {
  namePanel.style.display = 'none';
  removeTempPin();
  pendingLat = pendingLon = null;
}

btnNpSave.addEventListener('click', savePendingCar);
namePanelInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  savePendingCar();
  if (e.key === 'Escape') hideNamePanel();
});

async function savePendingCar() {
  if (pendingLat === null) return;
  const name = namePanelInput.value.trim() || 'My car';
  const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
  const address = await reverseGeocode(pendingLat, pendingLon);
  cars.push({ id, name, lat: pendingLat, lon: pendingLon, address });
  removeTempPin();
  namePanel.style.display = 'none';
  // Clear GPS locate pin after car is added at that location
  if (_gpsLocPin) {
    _gpsLocPin = null;
    if (_gpsLocPinTimer) { clearTimeout(_gpsLocPinTimer); _gpsLocPinTimer = null; }
    document.getElementById('gps-pin-popup').style.display = 'none';
  }
  await savePrefs();
  activeCarId = id;
  updateCarSelect();
  setNearestRegion(pendingLat, pendingLon);
  overlayCarMarkers();
  checkCarSilently(cars[cars.length - 1]); // schedule for the new car
  pendingLat = pendingLon = null;
}

// ── Cars panel ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function normDesc(s) {
  if (!s) return s;
  return s.replace(/\s*\(every\)/gi, '').replace(/\s+/g, ' ').trim();
}

function scheduleHTML(sched) {
  if (!sched) return '<span style="color:var(--muted)">Loading…</span>';
  const urgency  = sched.urgency || 'safe';
  const urgColor = urgency === 'today'    ? '#ef4444'
                 : urgency === 'tomorrow' ? '#f97316' : '#2563eb';
  const urgLabel = urgency === 'today'    ? '🚨 Move car today!'
                 : urgency === 'tomorrow' ? '⚠️ Move car tomorrow'
                 : '✅ All clear';

  const NO_SWEEP_RE = /^(no\s+(signage|sweeping|parking|stopping)|n\/a)\b/i;
  const fmt = arr => {
    const valid = (arr || []).filter(e => {
      if (!e || e.length < 2) return false;
      const d = (e[1] || '').trim();
      return d && d.toUpperCase() !== 'N/A' && !NO_SWEEP_RE.test(d);
    });
    if (!valid.length) return ['No sweeping scheduled'];
    const seen = new Set(), lines = [];
    for (const e of valid) {
      const desc = (e[1] || '').trim();
      const time = (e[2] || '').trim();
      const line = (time && time !== 'N/A' && !desc.includes(time)) ? `${normDesc(desc)} – ${time}` : normDesc(desc);
      if (line && !seen.has(line)) { seen.add(line); lines.push(line); }
      if (lines.length >= 4) break;
    }
    return lines.length ? lines : ['No sweeping'];
  };
  const side  = sched.car_side || 'even';
  const lines = fmt(side === 'even' ? sched.schedule_even : sched.schedule_odd).map(abbreviate);
  const itemsHTML = lines.map(l => `<div class="ce-sched-item">${esc(l)}</div>`).join('');

  return `<div class="ce-sched-urgency" style="color:${urgColor}">${urgLabel}</div>`
       + `<div class="ce-sched-header">Street sweeping schedule:</div>`
       + itemsHTML;
}

function renderCarsPanel() {
  if (carsPanel.contains(document.activeElement)) return; // don't disrupt inline editing
  // Remove all car entries but keep the legend
  for (const el of [...carsPanel.querySelectorAll('.car-entry')]) el.remove();
  cars.forEach((car, i) => {
    const color   = carColor(i);
    const sched   = carSchedules[car.id];
    const urgency = sched?.urgency || 'safe';
    const urgColor = urgency === 'today'    ? '#ef4444'
                   : urgency === 'tomorrow' ? '#f97316' : '#2563eb';
    const urgBg    = urgency === 'today'    ? '#fee2e2'
                   : urgency === 'tomorrow' ? '#ffedd5'
                   : '#ffffff';
    const addrText = abbreviate(car.address || sched?.address || '');

    const entry = document.createElement('div');
    entry.className = 'car-entry' + (car.id === _selectedCarId ? ' selected' : '');
    entry.dataset.id = car.id;
    entry.style.cssText = `--car-color:${color};--urg-color:${urgColor};--urg-bg:${urgBg}`;
    // Clicking card body (not buttons/active editors) selects the car
    entry.addEventListener('click', e => {
      if (e.target.closest('button') || e.target.closest('[contenteditable="true"]')) return;
      setSelectedCar(car.id);
    });

    entry.innerHTML = `
      <div class="ce-header">
        <span class="ce-dot"></span>
        <span class="ce-name" contenteditable="false" data-id="${esc(car.id)}" title="Double-click to edit">${esc(car.name)}</span>
        <button class="ce-remove" data-id="${esc(car.id)}" title="Remove">✕</button>
      </div>
      <div class="ce-addr" contenteditable="false" data-id="${esc(car.id)}" title="Double-click to edit">${esc(addrText)}</div>
      <div class="ce-sched">${scheduleHTML(sched)}</div>
      <div class="ce-actions">
        <button class="ce-btn ce-btn-gps" data-id="${esc(car.id)}">📍 GPS</button>
        <button class="ce-btn ce-btn-place" data-id="${esc(car.id)}">📌 Set location</button>
      </div>`;

    // ── Name editing (double-click to enter edit mode) ──
    const nameEl = entry.querySelector('.ce-name');
    nameEl.addEventListener('dblclick', () => {
      nameEl.contentEditable = 'true'; nameEl.focus();
      const r = document.createRange(); r.selectNodeContents(nameEl);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    });
    nameEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
      if (e.key === 'Escape') { nameEl.textContent = car.name; nameEl.blur(); }
    });
    nameEl.addEventListener('blur', async () => {
      nameEl.contentEditable = 'false';
      const v = nameEl.textContent.trim();
      if (v && v !== car.name) { car.name = v; updateCarSelect(); await savePrefs(); }
      else nameEl.textContent = car.name;
    });

    // ── Address editing (double-click to enter edit mode, geocode on commit) ──
    const addrEl = entry.querySelector('.ce-addr');
    addrEl.addEventListener('dblclick', () => {
      addrEl.contentEditable = 'true'; addrEl.focus();
      const r = document.createRange(); r.selectNodeContents(addrEl);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    });
    addrEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addrEl.blur(); }
      if (e.key === 'Escape') { addrEl.textContent = addrText; addrEl.blur(); }
    });
    addrEl.addEventListener('blur', async () => {
      addrEl.contentEditable = 'false';
      const q = addrEl.textContent.trim();
      if (!q || q === addrText) { addrEl.textContent = addrText; return; }
      addrEl.textContent = '…';
      try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&q=${encodeURIComponent(q)}`);
        const hits = await res.json();
        if (!hits.length) {
          addrEl.style.color = 'var(--red)';
          addrEl.textContent = '⚠️ Address not found';
          setTimeout(() => { addrEl.style.color = ''; addrEl.textContent = addrText; }, 2500);
          return;
        }
        // Build canonical address from Nominatim address components
        const a = hits[0].address || {};
        const num    = a.house_number || '';
        const street = a.road || a.pedestrian || a.footway || '';
        const city   = a.city || a.town || a.village || '';
        const canonical = [num, street].filter(Boolean).join(' ') + (city ? `, ${city}` : '');
        car.lat = parseFloat(hits[0].lat); car.lon = parseFloat(hits[0].lon);
        car.address = canonical || hits[0].display_name;
        await savePrefs();
        setNearestRegion(car.lat, car.lon);
        overlayCarMarkers();
        checkCarSilently(car);
      } catch (_) { addrEl.textContent = addrText; }
    });

    // ── GPS button ──
    entry.querySelector('.ce-btn-gps').addEventListener('click', () => {
      const btn = entry.querySelector('.ce-btn-gps');
      btn.disabled = true; btn.textContent = '…';
      getGPS(async (lat, lon) => {
        car.lat = lat; car.lon = lon;
        car.address = await reverseGeocode(lat, lon);
        await savePrefs();
        btn.disabled = false; btn.textContent = '📍 GPS';
        setNearestRegion(lat, lon); setLocationKnown('gps', lat, lon);
        // Immediately pan to new position (don't wait for /check to complete)
        try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat, lon }, 'mapbox.zoom': 16 }); } catch(_) {}
        await checkCarWithRender(car);
      }, msg => { btn.disabled = false; btn.textContent = '📍 GPS'; alert(`GPS: ${msg}`); });
    });

    // ── Set location button ──
    entry.querySelector('.ce-btn-place').addEventListener('click', () => startPlacing(car.id));

    // ── Remove button ──
    entry.querySelector('.ce-remove').addEventListener('click', async () => {
      delete carSchedules[car.id];
      cars = cars.filter(c => c.id !== car.id);
      if (activeCarId === car.id) activeCarId = cars[0]?.id ?? null;
      if (_selectedCarId === car.id) _selectedCarId = null;
      updateCarSelect();
      await savePrefs();
      overlayCarMarkers();
      renderCarsPanel();
      if (!cars.length) setStatus('idle', 'Add a car to check street sweeping.');
      else updateStatusFromSchedules();
    });

    carsPanel.appendChild(entry);
  });
}

// ── API fetch ─────────────────────────────────────────────────────────────────
function apiFetch(path, opts = {}) {
  const token = session?.access_token;
  return fetch(path, {
    ...opts,
    headers: { ...(opts.headers || {}), ...(token ? { Authorization: `Bearer ${token}` } : {}) },
  });
}

document.getElementById('btn-locate').addEventListener('click', () => {
  const btn = document.getElementById('btn-locate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-top-color:#2563eb;border-color:rgba(0,0,0,.15)"></span>';
  getGPS(async (lat, lon) => {
    btn.disabled = false; btn.textContent = '📍';
    setLocationKnown('gps', lat, lon);
    setNearestRegion(lat, lon);
    // Show "you are here" pin, pan to location
    if (_gpsLocPinTimer) clearTimeout(_gpsLocPinTimer);
    _gpsLocPin = { lat, lon };
    try { Plotly.relayout(mapDiv, { 'mapbox.center': { lat, lon }, 'mapbox.zoom': 16 }); } catch (_) {}
    overlayCarMarkers(); // render pin immediately
    updateGpsPinPopup();
    // Always load zone data around GPS location (handles crossing regions)
    await loadAreaMap(lat, lon, 16);
    updateGpsPinPopup();
    // Auto-clear pin after 15s
    _gpsLocPinTimer = setTimeout(() => {
      _gpsLocPin = null; _gpsLocPinTimer = null;
      document.getElementById('gps-pin-popup').style.display = 'none';
      overlayCarMarkers();
    }, 15000);
    // Refresh car schedules in background
    for (const car of cars) checkCarSilently(car);
  }, msg => { btn.disabled = false; btn.textContent = '📍'; alert(`GPS: ${msg}`); });
});

function setStatus(cls, text) { statusText.className = cls; statusText.textContent = text; }

// ── Map style picker ──────────────────────────────────────────────────────────
document.getElementById('sel-map-style').addEventListener('change', function() {
  try { Plotly.relayout(mapDiv, { 'mapbox.style': this.value }); } catch(_) {}
});

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
